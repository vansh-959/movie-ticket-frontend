<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cineplex - Login / Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: screen;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay {
            background-color: rgba(15, 23, 24, 0.95);
            backdrop-filter: blur(16px);
        }
        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .toast {
            min-width: 300px;
            padding: 16px 20px;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(120%);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(0); }
        .toast-success { border-left: 4px solid #10b981; }
        .toast-error { border-left: 4px solid #ef4444; }
    </style>
</head>
<body class="p-4">

    <!-- Toast Container -->
    <div id="toastContainer" class="toast-container"></div>

    <div class="bg-slate-800 border border-slate-700 rounded-3xl shadow-2xl max-w-md w-full p-8 relative overflow-hidden">
        
        <div class="text-center mb-8">
            <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-sky-400 to-indigo-500 flex items-center justify-center text-4xl shadow-lg shadow-sky-500/30 mx-auto mb-4">
                <i class="fa-solid fa-film text-white"></i>
            </div>
            <h2 class="text-3xl font-extrabold tracking-tight text-white mb-1">CINEPLEX</h2>
            <p class="text-slate-400 text-sm" id="authSubtitle">Login to book your tickets</p>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Email Address</label>
                <input type="email" id="loginEmail" placeholder="name@example.com" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            
            <button id="loginBtn" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-sky-500/20 mt-4 flex justify-center items-center gap-2">
                Login
            </button>
            <div id="loginError" class="text-red-400 text-xs font-bold text-center mt-2 p-2 bg-red-400/10 rounded-lg hidden"></div>

            <div class="text-right">
                <button id="toReset" class="text-xs text-slate-500 hover:text-sky-400 transition font-medium">Forgot Password?</button>
            </div>

            <p class="text-center text-sm text-slate-400 mt-6">
                Don't have an account? <button id="toSignup" class="text-sky-400 font-bold hover:underline">Sign up</button>
            </p>
        </div>

        <!-- RESET PASSWORD FORM -->
        <div id="resetForm" class="space-y-4" style="display: none;">
            <!-- Step 1: Email -->
            <div id="resetStep1" class="space-y-4">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Account Email</label>
                    <input type="email" id="resetEmail" placeholder="name@example.com" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                </div>
                <button id="resetNextBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-sky-500/20 flex justify-center items-center gap-2">
                    Verify Email
                </button>
            </div>

            <!-- Step 2: Answer & New Password -->
            <div id="resetStep2" class="space-y-4" style="display: none;">
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 mb-2">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Security Question</p>
                    <p id="displayQuestion" class="text-white font-medium text-sm">Loading question...</p>
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Your Answer</label>
                    <input type="text" id="resetAnswer" placeholder="Your secret answer" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                </div>
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">New Password</label>
                    <input type="password" id="resetPassword" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
                </div>
                <button id="resetBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-emerald-500/20 flex justify-center items-center gap-2">
                    Confirm Reset
                </button>
            </div>
            
            <div id="resetError" class="text-red-400 text-xs font-bold text-center mt-2 p-2 bg-red-400/10 rounded-lg hidden"></div>

            <p class="text-center text-sm text-slate-400 mt-6">
                Remember your password? <button onclick="toggleAuthMode('login')" class="text-emerald-400 font-bold hover:underline">Log in</button>
            </p>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" class="space-y-4" style="display: none;">
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Full Name</label>
                <input type="text" id="signupName" placeholder="Your Name" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Email Address</label>
                <input type="email" id="signupEmail" placeholder="name@example.com" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            <div class="space-y-1">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Password</label>
                <input type="password" id="signupPassword" placeholder="••••••••" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition">
            </div>
            
            <div class="pt-2 border-t border-slate-700/50 mt-2">
                <p class="text-[10px] text-emerald-400 font-bold uppercase mb-2">Security Recovery</p>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Security Question</label>
                        <select id="signupQuestion" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-2 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition text-sm">
                            <option value="What is your birth city?">What is your birth city?</option>
                            <option value="What was your first pet's name?">What was your first pet's name?</option>
                            <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                            <option value="What was the name of your primary school?">What was the name of your primary school?</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Security Answer</label>
                        <input type="text" id="signupAnswer" placeholder="Your secret answer" class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-2 px-4 focus:outline-none focus:ring-2 focus:ring-sky-500 transition text-sm">
                    </div>
                </div>
            </div>
            
            <button id="signupBtn" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-indigo-500/20 mt-4 flex justify-center items-center gap-2">
                Create Account
            </button>
            <div id="signupError" class="text-red-400 text-xs font-bold text-center mt-2 p-2 bg-red-400/10 rounded-lg hidden"></div>

            <p class="text-center text-sm text-slate-400 mt-6">
                Already have an account? <button id="toLogin" class="text-indigo-400 font-bold hover:underline">Log in</button>
            </p>
        </div>

    </div>

    <script>
        const API_URL = "http://127.0.0.1:3000/api";

        // Check if already logged in
        if (sessionStorage.getItem("cineplex_token")) {
            window.location.href = "index.html";
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<i class="fa-solid ${type==='success'?'fa-check-circle':'fa-circle-info'}"></i> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add("show"), 10);
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 500);
            }, 4000);
        }

        function toggleAuthMode(mode) {
            const loginForm = document.getElementById("loginForm");
            const signupForm = document.getElementById("signupForm");
            const resetForm = document.getElementById("resetForm");
            const subtitle = document.getElementById("authSubtitle");

            loginForm.style.display = "none";
            signupForm.style.display = "none";
            resetForm.style.display = "none";
            document.getElementById("resetStep1").style.display = "block";
            document.getElementById("resetStep2").style.display = "none";

            if (mode === 'signup') {
                signupForm.style.display = "block";
                subtitle.innerText = "Create an account to book tickets";
            } else if (mode === 'reset') {
                resetForm.style.display = "block";
                subtitle.innerText = "Security Verification";
            } else {
                loginForm.style.display = "block";
                subtitle.innerText = "Login to book your tickets";
            }
        }

        async function handleLogin() {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value.trim();
            const errEl = document.getElementById("loginError");
            const btn = document.getElementById("loginBtn");

            if (!email || !password) {
                showAuthError(errEl, "Please enter both email and password.");
                return;
            }

            setLoading(btn, true);
            errEl.classList.add("hidden");

            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    sessionStorage.setItem("cineplex_token", data.token);
                    sessionStorage.setItem("cineplex_user", JSON.stringify(data.user));
                    showToast(`Welcome back, ${data.user.name}!`, "success");
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    showAuthError(errEl, data.message || "Invalid email or password.");
                }
            } catch(e) {
                showAuthError(errEl, "Connection error. Server might be offline.");
            } finally {
                setLoading(btn, false, "Login");
            }
        }

        async function handleResetNext() {
            const email = document.getElementById("resetEmail").value.trim();
            const errEl = document.getElementById("resetError");
            const btn = document.getElementById("resetNextBtn");

            if (!email) {
                showAuthError(errEl, "Enter your email first.");
                return;
            }

            setLoading(btn, true);
            errEl.classList.add("hidden");

            try {
                const res = await fetch(`${API_URL}/users/get-security-question`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("displayQuestion").innerText = data.question;
                    document.getElementById("resetStep1").style.display = "none";
                    document.getElementById("resetStep2").style.display = "block";
                    document.getElementById("authSubtitle").innerText = "Answer & Reset";
                } else {
                    showAuthError(errEl, data.message);
                }
            } catch (e) {
                console.error(e);
                showAuthError(errEl, "Connection error: " + e.message);
            } finally {
                setLoading(btn, false, "Verify Email");
            }
        }

        async function handleResetPassword() {
            const email = document.getElementById("resetEmail").value.trim();
            const securityAnswer = document.getElementById("resetAnswer").value.trim();
            const newPassword = document.getElementById("resetPassword").value.trim();
            const errEl = document.getElementById("resetError");
            const btn = document.getElementById("resetBtn");

            if (!securityAnswer || !newPassword) {
                showAuthError(errEl, "Answer and new password are required.");
                return;
            }

            setLoading(btn, true);
            errEl.classList.add("hidden");

            try {
                const response = await fetch(`${API_URL}/users/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, securityAnswer, newPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showToast("Password updated securely!", "success");
                    setTimeout(() => toggleAuthMode('login'), 1500);
                } else {
                    showAuthError(errEl, data.message || "Reset failed.");
                }
            } catch(e) {
                showAuthError(errEl, "Connection error.");
            } finally {
                setLoading(btn, false, "Confirm Reset");
            }
        }

        async function handleSignup() {
            const name = document.getElementById("signupName").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value.trim();
            const securityQuestion = document.getElementById("signupQuestion").value;
            const securityAnswer = document.getElementById("signupAnswer").value.trim();
            const errEl = document.getElementById("signupError");
            const btn = document.getElementById("signupBtn");

            if (!name || !email || !password || !securityAnswer) {
                showAuthError(errEl, "All fields are required.");
                return;
            }

            setLoading(btn, true);
            errEl.classList.add("hidden");

            try {
                const response = await fetch(`${API_URL}/users/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password, securityQuestion, securityAnswer })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    sessionStorage.setItem("cineplex_token", data.token);
                    sessionStorage.setItem("cineplex_user", JSON.stringify(data.user));
                    showToast("Account secured & created!", "success");
                    setTimeout(() => window.location.href = "index.html", 1000);
                } else {
                    showAuthError(errEl, data.message || "Signup failed.");
                }
            } catch(e) {
                showAuthError(errEl, "Connection error.");
            } finally {
                setLoading(btn, false, "Create Account");
            }
        }

        function showAuthError(el, msg) {
            el.innerText = msg;
            el.classList.remove("hidden");
        }

        function setLoading(btn, isLoading, text) {
            if (isLoading) {
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Please wait...';
                btn.disabled = true;
            } else {
                btn.innerHTML = text;
                btn.disabled = false;
            }
        }

        document.getElementById("loginBtn").addEventListener("click", handleLogin);
        document.getElementById("signupBtn").addEventListener("click", handleSignup);
        document.getElementById("resetNextBtn").addEventListener("click", handleResetNext);
        document.getElementById("resetBtn").addEventListener("click", handleResetPassword);
        document.getElementById("toSignup").addEventListener("click", () => toggleAuthMode('signup'));
        document.getElementById("toLogin").addEventListener("click", () => toggleAuthMode('login'));
        document.getElementById("toReset").addEventListener("click", () => toggleAuthMode('reset'));
    </script>
</body>
</html>
